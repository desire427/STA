<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STA - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <!-- Card Container -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex w-full max-w-4xl h-[600px]">
        
        <!-- Left Side - Blue Panel -->
        <div class="w-2/5 bg-[#1a237e] flex flex-col items-center justify-center p-2 relative">
            <!-- Logo Container -->
            <div class="bg-gray-200 rounded-lg w-24 h-24 flex items-center justify-center mb-6">
                <span class="text-4xl font-bold text-black">S</span>
            </div>
            <!-- STA Title -->
            <h1 class="text-white text-4xl font-bold tracking-wider">STA</h1>
        </div>

        <!-- Right Side - Form -->
        <div class="w-3/5 p-12 flex flex-col relative">
            
            <!-- Language Selector -->
            <div class="absolute top-6 right-8">
                <select class="text-xs text-gray-500 bg-transparent border-none outline-none cursor-pointer">
                    <option>English (UK)</option>
                    <option>Français</option>
                </select>
            </div>

            <!-- Title -->
            <h2 class="text-2xl font-semibold text-gray-800 mb-8 mt-4">Create Account</h2>

            <!-- Affichage des erreurs de validation -->
            {% if form.errors %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-600 text-xs">
                {% for field in form %}
                    {% for error in field.errors %}<p>{{ field.label }}: {{ error }}</p>{% endfor %}
                {% endfor %}
                {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
            </div>
            {% endif %}

            <!-- Form -->
            <form class="space-y-5" method="POST">
                {% csrf_token %}
                
                <!-- Full Name -->
                <div>
                    <input 
                        type="text" 
                        name="username"
                        placeholder="Full Name" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-[#1a237e] focus:ring-1 focus:ring-[#1a237e] transition-colors"
                    >
                </div>

                <!-- Email -->
                <div>
                    <input 
                        type="email" 
                        name="email"
                        placeholder="Email" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-[#1a237e] focus:ring-1 focus:ring-[#1a237e] transition-colors"
                    >
                </div>

                <!-- Password -->
                <div class="relative">
                    <input 
                        type="password" 
                        name="password1"
                        placeholder="Password" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-[#1a237e] focus:ring-1 focus:ring-[#1a237e] transition-colors"
                    >
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>

                <!-- Confirm Password -->
                <div class="relative">
                    <input 
                        type="password" 
                        name="password2"
                        placeholder="Confirm Password" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-[#1a237e] focus:ring-1 focus:ring-[#1a237e] transition-colors"
                    >
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>

                <!-- Terms Checkbox -->
                <div class="flex items-start gap-3">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms"
                        class="mt-1 w-4 h-4 border-gray-300 rounded text-[#1a237e] focus:ring-[#1a237e] cursor-pointer"
                    >
                    <label for="terms" class="text-xs text-gray-500 leading-relaxed cursor-pointer">
                        I have read and agreed to the Terms of Service and Privacy Policy
                    </label>
                </div>

                <!-- Create Account Button -->
                <button 
                    type="submit" 
                    class="w-full bg-[#1a237e] text-white font-semibold py-3.5 rounded-lg hover:bg-[#0d1642] transition-colors duration-200 shadow-md"
                >
                    Create Account
                </button>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500 text-xs">Or</span>
                    </div>
                </div>

                <!-- Social Login -->
                <div class="flex gap-4">
                    <button 
                        type="button" 
                        class="flex-1 flex items-center justify-center gap-2 border border-gray-200 rounded-lg py-2.5 hover:bg-gray-50 transition-colors"
                    >
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="text-xs text-gray-600 font-medium">Signup with Google</span>
                    </button>
                    
                    <button 
                        type="button" 
                        class="flex-1 flex items-center justify-center gap-2 border border-gray-200 rounded-lg py-2.5 hover:bg-gray-50 transition-colors"
                    >
                        <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span class="text-xs text-gray-600 font-medium">Signup with Facebook</span>
                    </button>
                </div>

                <!-- Login Link -->
                <div class="text-center mt-6">
                    <p class="text-sm text-gray-500">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-[#1a237e] font-medium hover:underline">Log In</a>
                    </p>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
